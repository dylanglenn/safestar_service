$kind: http-example
request:
  url: "{{baseUrl}}/driver/:id"
  method: PUT
  headers:
    Accept: application/json
    Content-Type: application/json
  pathVariables:
    id: "1001"
  body:
    type: json
    content: |-
      {
        "driver": {
          "firstName": "Alex",
          "lastName": "Johnson",
          "license": {
            "issueDate": "2022-05-14",
            "expiry": "2026-05-14",
            "issuingState": "CA",
            "restrictions": [
              "B"
            ]
          },
          "email": "alex.johnson@example.com"
        },
        "safetyScore": 110,
        "hardStops": 0,
        "speeding": 1,
        "nightDrives": 0,
        "weather": 0,
        "ignoredWarnings": 0
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "VALIDATION_ERROR",
          "message": "Request body failed validation.",
          "details": {
            "fields": [
              {
                "field": "safetyScore",
                "issue": "must be an integer between 0 and 100"
              }
            ]
          }
        }
      }
order: 2000
