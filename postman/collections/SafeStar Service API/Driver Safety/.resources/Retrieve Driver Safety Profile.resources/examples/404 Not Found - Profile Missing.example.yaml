$kind: http-example
request:
  url: "{{baseUrl}}/driver/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: "0000"
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "PROFILE_NOT_FOUND",
          "message": "No safety profile found for the specified driver.",
          "details": {
            "driverId": "0000"
          }
        }
      }
order: 2000
