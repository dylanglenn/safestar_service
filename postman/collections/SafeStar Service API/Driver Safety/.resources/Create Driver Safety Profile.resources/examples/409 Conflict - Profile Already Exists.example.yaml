$kind: http-example
request:
  url: "{{baseUrl}}/driver/:id"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: "1001"
  body:
    type: json
    content: "{}"
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "PROFILE_ALREADY_EXISTS",
          "message": "A safety profile already exists for this driver.",
          "details": {
            "driverId": 1002,
            "existingProfileId": "2"
          }
        }
      }
order: 2000
