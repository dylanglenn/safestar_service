$kind: http-example
name: 200 - Completed run retrieved successfully
request:
  url: "{{baseUrl}}/run/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: "1"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "run": "1",
        "status": "COMPLETE"
      }
order: 2000
