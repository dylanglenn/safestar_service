$kind: http-example
request:
  url: "{{baseUrl}}/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "vehicle": "1002",
        "driver": "1001"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "UNEXPECTED_ERROR",
          "message": "An unexpected error occurred.",
          "details": {}
        }
      }
order: 2000
