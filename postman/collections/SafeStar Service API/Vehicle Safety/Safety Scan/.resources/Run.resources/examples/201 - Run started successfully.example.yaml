$kind: http-example
request:
  url: "{{baseUrl}}/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "vehicle": "1002",
        "driver": "1001"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "run": "1",
        "status": "QUEUED"
      }
order: 1000
