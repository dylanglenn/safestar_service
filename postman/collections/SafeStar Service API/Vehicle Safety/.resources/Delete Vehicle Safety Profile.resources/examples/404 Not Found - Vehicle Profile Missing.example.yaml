$kind: http-example
request:
  url: "{{baseUrl}}/vehicle/:id"
  method: DELETE
  headers:
    Accept: application/json
  pathVariables:
    id: "1002"
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "VEHICLE_PROFILE_NOT_FOUND",
          "message": "No safety profile found for the specified vehicle.",
          "details": {
            "vehicleId": "1002"
          }
        }
      }
order: 1000
