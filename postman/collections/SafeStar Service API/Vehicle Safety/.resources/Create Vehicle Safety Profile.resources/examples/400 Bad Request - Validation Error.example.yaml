$kind: http-example
request:
  url: "{{baseUrl}}/vehicle/:id"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: "1002"
  body:
    type: json
    content: |-
      {
        "vin": "1HGCM82633A004352",
        "tpms": "OK",
        "tailLights": "OK",
        "oilPressure": "OK",
        "sensors": "OK",
        "defrost": "OK",
        "airbags": "OK",
        "battery": "OK",
        "newCode": true,
        "activeCodes": [
          "P0300",
          "P0420",
          "P0455",
          "P0171",
          "P0128"
        ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "VALIDATION_ERROR",
          "message": "Request body failed validation.",
          "details": {
            "fields": [
              {
                "field": "vin",
                "issue": "must be 17 characters"
              }
            ]
          }
        }
      }
order: 2000
