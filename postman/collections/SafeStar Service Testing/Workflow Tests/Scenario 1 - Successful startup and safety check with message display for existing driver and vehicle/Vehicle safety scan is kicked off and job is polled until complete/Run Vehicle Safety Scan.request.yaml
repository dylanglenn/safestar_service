$kind: http-request
name: Run Vehicle Safety Scan
url: "{{baseUrl}}/run"
method: POST
headers:
  x-mock-response-code: "201"
body:
  type: json
  content: |-
    {
      "vehicle": "{{vehicleID}}",
      "driver": "{{driverID}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.collectionVariables.set("safetyScanID", pm.response.json().run);
    language: text/javascript
order: 1000
