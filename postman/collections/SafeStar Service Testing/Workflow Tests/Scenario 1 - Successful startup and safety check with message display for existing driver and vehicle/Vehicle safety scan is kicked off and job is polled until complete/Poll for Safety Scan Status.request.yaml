$kind: http-request
name: Poll for Safety Scan Status
url: "{{baseUrl}}/run/:id"
method: GET
pathVariables:
  id: "{{safetyScanID}}"
scripts:
  - type: afterResponse
    code: |-
      if(pm.response.json().status === "QUEUED") {
          pm.execution.setNextRequest('Poll for Safety Scan Status');
      }
    language: text/javascript
order: 2000
