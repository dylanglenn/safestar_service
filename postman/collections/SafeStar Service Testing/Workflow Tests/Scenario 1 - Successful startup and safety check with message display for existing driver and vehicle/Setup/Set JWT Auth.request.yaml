$kind: http-request
name: Set JWT Auth
url: https://postman-echo.com/get
method: GET
headers:
  Accept: application/json
scripts:
  - type: beforeRequest
    code: >
      const jose = pm.require('jsr:@panva/jose@6.2.2');



      /**
       * Creates a JSON Web Token.
       * @param {string} issuer - The issuer claim (iss).
       * @param {string} subject - The subject claim (sub).
       * @param {string} secret - The secret key for signing.
       * @returns {Promise<string>} The generated JWT token.
       */
      async function createJsonWebToken(issuer, subject, secret) {
          const secretKey = new TextEncoder().encode(secret); // Key must be a Uint8Array
          const now = Math.round(Date.now() / 1000);

          const jwt = await new jose.SignJWT({
              'sub': subject,
              'iss': issuer,
              'iat': now, // Issued at time
          })
              .setProtectedHeader({ alg: 'HS256', typ: 'JWT', secret: 'a-string-secret-at-least-256-bits-long' }) // Set algorithm and type
              .setExpirationTime('1h') // Token valid for 1 hour
              .sign(secretKey); // Sign with the secret key

          return jwt;
      }


      const secret = pm.vault.get("jwt_secret") ||
      pm.environment.get("jwt_secret")


      // Example usage:

      createJsonWebToken('postvehicle-qa', 'qa-user-1', secret)
          .then((token) => {
              console.log(pm.environment.get('jwt_secret'))
              console.log('Generated JWT:', token);
              pm.vault.set('jwt_signed', token)
              // You can paste this token into the [jwt.io Debugger](https://jwt.io/) to verify its contents
          })
          .catch(console.error);
    language: text/javascript
    packages:
      jsr:@panva/jose@6.2.2:
        id: jsr:@panva/jose@6.2.2
order: 1000
