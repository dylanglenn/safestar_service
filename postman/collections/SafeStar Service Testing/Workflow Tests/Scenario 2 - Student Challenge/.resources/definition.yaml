$kind: collection
scripts:
  - type: http:afterResponse
    code: >-
      pm.test("Status code is one of the expected values", () => {
          // Define an array of acceptable status codes
          const expectedStatusCodes = [200, 201];

          // Assert that the actual response code is included in the expectedStatusCodes array
          pm.expect(pm.response.code).to.be.oneOf(expectedStatusCodes);
      });
    language: text/javascript
order: 2000
