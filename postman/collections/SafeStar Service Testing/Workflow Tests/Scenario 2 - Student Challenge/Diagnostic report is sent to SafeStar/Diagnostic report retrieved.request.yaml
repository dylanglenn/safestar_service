$kind: http-request
name: Diagnostic report retrieved
url: "{{baseUrl}}/diagnostics/:id"
method: GET
pathVariables:
  id: "{{diagnosticRunID}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 2000
