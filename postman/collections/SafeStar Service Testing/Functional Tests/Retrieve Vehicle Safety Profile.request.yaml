$kind: http-request
name: Retrieve Vehicle Safety Profile
method: GET
url: '{{baseUrl}}/vehicle/:id'
order: 6000
description: |-
  Tests the GET /vehicle/:id endpoint that retrieves an existing vehicle safety profile.

  Why test this? After creating a vehicle profile, we need to confirm the data was persisted
  and can be read back with the correct structure. This test validates the vehicleId, status,
  riskScore, and the metrics object. Response time is also checked to catch performance issues
  in the vehicle profile lookup path.
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1002'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Retrieve Vehicle Safety Profile
      //
      // We verify the GET endpoint returns a complete, well-formed vehicle profile.
      // Run this AFTER "Create Vehicle Safety Profile" to ensure the profile exists.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 200 OK
      // WHY: A successful GET returns 200. If the vehicle profile doesn't exist,
      // the server should return 404. Getting 200 confirms the profile was found
      // and the server is returning data, not an error.
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      // TEST 2: Response body must be valid, parseable JSON
      // WHY: Before accessing any fields, we confirm the body is valid JSON.
      // This catches cases where the server returns an error page or empty body.
      pm.test("Response body is valid JSON", function () {
          pm.response.json();
      });

      const responseBody = pm.response.json();

      // TEST 3: vehicleId must exist and be a string
      // WHY: The vehicleId is the primary identifier for this vehicle profile.
      // Its presence confirms we retrieved the correct resource.
      pm.test("vehicleId exists and is a string", function () {
          pm.expect(responseBody).to.have.property("vehicleId");
          pm.expect(responseBody.vehicleId).to.be.a("string");
      });

      // TEST 4: status must be a string
      // WHY: The status field can be ACTIVE, INACTIVE, SUSPENDED, etc. depending
      // on the vehicle's state. We don't assert a specific value here because the
      // status may change over time. We just verify it's a string — not null or
      // undefined — so the UI can always display something meaningful.
      pm.test("status is a string", function () {
          pm.expect(responseBody).to.have.property("status");
          pm.expect(responseBody.status).to.be.a("string");
      });

      // TEST 5: riskScore must be a number
      // WHY: The riskScore drives insurance pricing and safety alerts. If it's not
      // a number, any downstream calculation will produce NaN or throw an error.
      pm.test("riskScore is a number", function () {
          pm.expect(responseBody).to.have.property("riskScore");
          pm.expect(responseBody.riskScore).to.be.a("number");
      });

      // TEST 6: metrics object must exist
      // WHY: The metrics object is a required part of the vehicle profile response.
      // Its absence would mean the profile is incomplete.
      pm.test("metrics object exists", function () {
          pm.expect(responseBody).to.have.property("metrics");
          pm.expect(responseBody.metrics).to.be.an("object");
      });

      // TEST 7: All three metric event counters must be numbers
      // WHY: Each counter tracks a specific type of driving event. They must all
      // be numbers so the UI can display them and the scoring algorithm can use them.
      // We loop over the fields instead of writing three separate tests — this is
      // more maintainable and easier to extend if new metrics are added.
      pm.test("metrics event counters are all numbers", function () {
          const metricFields = ["hardCorneringEvents", "hardBrakingEvents", "speedingEvents"];
          metricFields.forEach(function (field) {
              pm.expect(responseBody.metrics).to.have.property(field,
                  `metrics.${field} is missing`
              );
              pm.expect(responseBody.metrics[field]).to.be.a("number",
                  `metrics.${field} should be a number`
              );
          });
      });

      // TEST 8: Response time must be under 2000ms
      // WHY: Vehicle profile lookups should be fast. A slow response here could
      // indicate a missing index on the vehicleId column or an unoptimized join
      // with the Vehicle Service data.
      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
