$kind: http-request
url: "{{baseUrl}}/driver/:id"
method: PUT
headers:
  Accept: application/json
pathVariables:
  id: "1001"
scripts:
  - type: afterResponse
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Update Driver Safety Profile
      //
      // A PUT request replaces the entire resource. We verify the server acknowledges
      // the update with the correct status code and returns a valid, complete profile
      // in the response body. We do NOT assert specific field values here (like the
      // exact safetyScore) because an update may legitimately change those values —
      // we just confirm the structure and types are correct.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 200 OK
      // WHY: A successful update returns 200 OK, not 201 Created. 201 means a new
      // resource was created — but we're updating an existing one. If the server
      // returns 201 on a PUT, it's either creating a duplicate or mishandling the
      // request. This distinction matters for idempotency and REST correctness.
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      // TEST 2: Response body must be valid, parseable JSON
      // WHY: After an update, the server should return the updated resource so the
      // client can confirm what was saved. If the body is not valid JSON, the client
      // has no way to verify the update succeeded.
      pm.test("Response body is valid JSON", function () {
          pm.response.json();
      });

      const responseBody = pm.response.json();

      // TEST 3: profileId field must exist and be a string
      // WHY: The response should include the profileId so the client can confirm
      // it received the correct resource back. A missing profileId could mean the
      // server returned a generic success object instead of the updated profile.
      pm.test("profileId exists and is a string", function () {
          pm.expect(responseBody).to.have.property("profileId");
          pm.expect(responseBody.profileId).to.be.a("string");
      });

      // TEST 4: driver object must exist
      // WHY: A PUT response should return the full updated resource. If the driver
      // sub-object is missing, the response is incomplete and the client would need
      // to make a second GET request just to see the current state — bad API design.
      pm.test("driver object exists in the response", function () {
          pm.expect(responseBody).to.have.property("driver");
          pm.expect(responseBody.driver).to.be.an("object");
      });

      // TEST 5: safetyScore must still be a valid number after the update
      // WHY: After an update, the safetyScore may have changed (e.g. an incident was
      // recorded). We don't assert a specific value here because the update may
      // legitimately change it. We just verify it's still a number — not null, not
      // a string, not undefined. A type change here would break all score calculations.
      pm.test("safetyScore is still a number after update", function () {
          pm.expect(responseBody).to.have.property("safetyScore");
          pm.expect(responseBody.safetyScore).to.be.a("number");
      });

      // TEST 6: Response time must be under 2000ms
      // WHY: Update operations often involve more work than reads (validation, writes,
      // cache invalidation). A slow PUT can indicate inefficient update logic or
      // missing database indexes on the fields being updated.
      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 3000
