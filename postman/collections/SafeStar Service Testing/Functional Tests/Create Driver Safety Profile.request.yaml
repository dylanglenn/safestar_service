$kind: http-request
name: Create Driver Safety Profile
method: POST
url: '{{baseUrl}}/driver/:id'
order: 1000
description: |-
  Tests the POST /driver/:id endpoint that creates a new driver safety profile in the SafeStar system.

  Why test this? Creating a profile is the entry point for all driver-related functionality. If this
  endpoint is broken, nothing else works. We verify the response shape, the initial state of all
  safety metrics, and capture the profileId for use in downstream requests.
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1001'
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Create Driver Safety Profile
      //
      // Functional tests verify that an API endpoint behaves correctly end-to-end:
      // the right status code, the right response shape, and the right initial values.
      // Each pm.test() block is an independent assertion — if one fails, the others
      // still run, giving you a complete picture of what's broken.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 201 Created
      // WHY: When a POST request successfully creates a new resource, the HTTP spec
      // says the server SHOULD return 201 (Created), not 200 (OK). 200 means "the
      // request succeeded" but 201 specifically means "a new resource was created."
      // If this returns 200, the API is not following REST conventions correctly.
      pm.test("Status code is 201 Created", function () {
          pm.response.to.have.status(201);
      });

      // TEST 2: Response must include a Content-Type: application/json header
      // WHY: Even if the body looks like JSON, we need the server to explicitly declare
      // it as JSON. Clients use this header to decide how to parse the response.
      // A missing or wrong Content-Type can break downstream consumers.
      pm.test("Response has Content-Type: application/json header", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // TEST 3: Response body must be valid, parseable JSON
      // WHY: Even if the Content-Type header says JSON, the body could still be
      // malformed (e.g. a partial write, a server error message in plain text).
      // pm.response.json() will throw if the body is not valid JSON, which causes
      // this test to fail — exactly what we want.
      pm.test("Response body is valid JSON", function () {
          pm.response.json(); // throws if not valid JSON
      });

      // Parse the response once and reuse it in all subsequent tests
      const responseBody = pm.response.json();

      // TEST 4: profileId field must exist and be a string
      // WHY: The profileId is the primary key for this driver profile. Every future
      // request that references this driver will use this ID. If it's missing or the
      // wrong type, the entire downstream test chain will break.
      pm.test("profileId exists and is a string", function () {
          pm.expect(responseBody).to.have.property("profileId");
          pm.expect(responseBody.profileId).to.be.a("string");
      });

      // TEST 5: driver object must exist with required personal fields
      // WHY: The driver sub-object contains the personal information associated with
      // this profile. We verify the top-level fields that identify the driver.
      // If any are missing, the profile is incomplete and the UI will break.
      pm.test("driver object exists with firstName, lastName, and email", function () {
          pm.expect(responseBody).to.have.property("driver");
          pm.expect(responseBody.driver).to.be.an("object");
          pm.expect(responseBody.driver).to.have.property("firstName");
          pm.expect(responseBody.driver).to.have.property("lastName");
          pm.expect(responseBody.driver).to.have.property("email");
      });

      // TEST 6: safetyScore must be a number
      // WHY: The safetyScore is the core metric of the SafeStar service — it drives
      // insurance pricing, alerts, and recommendations. If it's not a number (e.g.
      // it comes back as a string "100" or null), calculations will silently fail.
      pm.test("safetyScore is a number", function () {
          pm.expect(responseBody).to.have.property("safetyScore");
          pm.expect(responseBody.safetyScore).to.be.a("number");
      });

      // TEST 7: safetyScore must start at 100 for a brand new profile
      // WHY: Business rule — every new driver starts with a perfect safety score of 100.
      // Incidents deduct from this score over time. If a new profile doesn't start at
      // 100, either the business logic is wrong or test data is leaking between runs.
      pm.test("safetyScore starts at 100 for a new profile", function () {
          pm.expect(responseBody.safetyScore).to.equal(100);
      });

      // TEST 8: All incident metric fields must be 0 for a brand new profile
      // WHY: A newly created profile has no driving history, so every incident counter
      // must be zero. If any of these are non-zero, it means either the API is
      // initializing state incorrectly or data from a previous profile is bleeding in.
      pm.test("All incident metrics are 0 for a new profile", function () {
          const metrics = ["hardStops", "speeding", "nightDrives", "weather", "ignoredWarnings"];
          metrics.forEach(function (metric) {
              pm.expect(responseBody).to.have.property(metric);
              pm.expect(responseBody[metric]).to.equal(0,
                  `Expected ${metric} to be 0 for a new profile, but got ${responseBody[metric]}`
              );
          });
      });

      // CHAIN: Save profileId to a collection variable for use in later requests
      // WHY: The Retrieve, Update, and Delete driver tests all need to reference the
      // same profile. By saving it here, we avoid hardcoding IDs and make the test
      // suite self-contained — it works even if the ID changes between environments.
      const profileId = responseBody.profileId;
      pm.collectionVariables.set("driverProfileId", profileId);
      console.log("Saved driverProfileId to collection variables:", profileId);
