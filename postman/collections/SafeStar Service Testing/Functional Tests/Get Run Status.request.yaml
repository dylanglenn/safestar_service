$kind: http-request
url: "{{baseUrl}}/run/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  id: "1"
scripts:
  - type: afterResponse
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Get Run Status
      //
      // This endpoint is polled to check the progress of an async safety scan.
      // We verify the response shape, the status type, and that the status value
      // is one of the known valid states defined by the API contract.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 200 OK
      // WHY: A successful status lookup returns 200. If the run ID doesn't exist,
      // the server should return 404. Getting 200 confirms the run was found.
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      // TEST 2: Response body must be valid, parseable JSON
      // WHY: We need to parse the body to read the run status. Invalid JSON here
      // would mean the polling logic in the client app would silently fail.
      pm.test("Response body is valid JSON", function () {
          pm.response.json();
      });

      const responseBody = pm.response.json();

      // TEST 3: run field must exist and be a string
      // WHY: The response should echo back the run ID so the client can confirm
      // it received the status for the correct run (not a different one).
      pm.test("run field exists and is a string", function () {
          pm.expect(responseBody).to.have.property("run");
          pm.expect(responseBody.run).to.be.a("string");
      });

      // TEST 4: status must be a string
      // WHY: The status field drives the polling logic — the client keeps polling
      // until status is COMPLETE or FAILED. If status is null or undefined, the
      // polling loop will never terminate correctly. We verify it's always a string.
      pm.test("status is a string", function () {
          pm.expect(responseBody).to.have.property("status");
          pm.expect(responseBody.status).to.be.a("string");
      });

      // TEST 5: status must be one of the valid enum values
      // WHY: The API contract defines exactly four valid status values. If the server
      // returns anything else (e.g. "PROCESSING", "DONE", "ERROR"), it's a bug —
      // either a typo in the server code or an undocumented state. This test acts
      // as a contract enforcement check: the API must only return known states.
      // This is especially important for clients that use switch/case on the status.
      pm.test("status is one of the valid enum values", function () {
          const validStatuses = ["QUEUED", "IN_PROGRESS", "COMPLETE", "FAILED"];
          pm.expect(validStatuses).to.include(responseBody.status,
              `Unexpected status value: "${responseBody.status}". ` +
              `Valid values are: ${validStatuses.join(", ")}`
          );
      });

      // TEST 6: Response time must be under 2000ms
      // WHY: Status polling is called repeatedly by clients waiting for a scan to
      // complete. If each poll takes 2+ seconds, the user experience degrades
      // significantly. This endpoint should be one of the fastest in the API.
      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 10000
