$kind: collection
description: "End-to-end workflow test covering the happy path for a driver
  startup and safety check sequence. The scenario walks through four ordered
  stages: (1) Setup — authenticates by setting a JWT token; (2) Existing driver
  starts vehicle and initializes SafeStar with app — confirms that both the
  driver and vehicle already have safety profiles registered in the SafeStar
  Service; (3) Vehicle safety scan is kicked off and job is polled until
  complete — runs an asynchronous safety scan against the driver-vehicle
  pairing, polls until the job finishes, updates the vehicle profile with the
  scan results, and then retrieves the personalized Driver Message to display to
  the driver; (4) Driver ends trip and turns off vehicle trigger driver safety
  metrics update — updates the driver's safety metrics with data from the
  completed trip; and (5) Teardown — clears the JWT token. All requests in this
  scenario are expected to succeed, validating the core SafeStar happy-path flow
  from app initialization through to message display and post-trip metric
  recording."
order: 1000
