$kind: http-request
name: Existing driver is found
url: "{{baseUrl}}/driver/:id"
method: GET
pathVariables:
  id: "1001"
scripts:
  - type: afterResponse
    code: |
      pm.test("SafetyScore is a number", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.safetyScore).to.be.a('number');
      });

      pm.test("SafetyScore between 0 and 100"), function () {
          pm.expect(jsonData.safetyScore).to.be.above(-1);
          pm.expect(jsonData.safetyScore).to.be.below(101);
      };
    language: text/javascript
order: 1000
