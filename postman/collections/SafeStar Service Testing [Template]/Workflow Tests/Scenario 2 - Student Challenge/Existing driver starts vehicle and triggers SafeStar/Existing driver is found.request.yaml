$kind: http-request
name: Existing driver is found
url: "{{baseUrl}}/driver/:id"
method: GET
pathVariables:
  - key: id
    value: "1001"
scripts:
  - type: afterResponse
    code: |-
      pm.test("SafetyScore is a number", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.safetyScore).to.be.a('string');
      });
    language: text/javascript
order: 1000
