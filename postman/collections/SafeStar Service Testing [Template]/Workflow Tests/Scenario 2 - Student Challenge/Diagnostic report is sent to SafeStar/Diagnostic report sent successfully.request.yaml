$kind: http-request
name: Diagnostic report sent successfully
url: "{{baseUrl}}/diagnostics/send/:id"
method: POST
headers:
  - key: x-mock-response-code
    value: "204"
pathVariables:
  - key: id
    value: "1"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
    language: text/javascript
order: 3000
