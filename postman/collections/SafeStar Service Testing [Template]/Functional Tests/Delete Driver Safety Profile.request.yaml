$kind: http-request
name: Delete Driver Safety Profile
method: DELETE
url: '{{baseUrl}}/driver/:id'
order: 4000
description: |-
  Tests the DELETE /driver/:id endpoint that removes a driver safety profile from the system.

  Why test this? Deletion is irreversible, so it's critical to verify the API follows the
  correct REST convention: 204 No Content with an empty body. We also confirm the response
  arrives quickly. This request should be run last in the driver profile sequence, since
  deleting the profile will cause subsequent Retrieve/Update tests to return 404.
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: '1001'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Delete Driver Safety Profile
      //
      // DELETE is the most destructive operation. We verify the server uses the
      // correct HTTP status code and returns no body. These two checks together
      // confirm the API follows the REST standard for resource deletion.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 204 No Content
      // WHY: The HTTP spec says a successful DELETE should return 204 No Content.
      // This means: "I deleted it, and there's nothing to send back."
      // Returning 200 with a body is also acceptable in some APIs, but 204 is the
      // most common and correct convention. If you see 200 here, check whether the
      // API is also returning a body — if so, that's a design inconsistency.
      // If you see 404, the resource wasn't found (maybe it was already deleted).
      pm.test("Status code is 204 No Content", function () {
          pm.response.to.have.status(204);
      });

      // TEST 2: Response body must be empty
      // WHY: A 204 response MUST NOT include a message body, per RFC 7231.
      // If the server returns a body with a 204, it's violating the HTTP spec.
      // This can cause issues with HTTP clients that don't expect a body after 204
      // and may fail to parse or ignore it correctly. We check that the response
      // text is empty (or just whitespace) to enforce this contract.
      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text().trim()).to.equal("");
      });

      // TEST 3: Response time must be under 2000ms
      // WHY: Even a DELETE should be fast. A slow delete can indicate the server
      // is doing expensive cleanup work synchronously (e.g. cascading deletes across
      // many tables) that should instead be done asynchronously in the background.
      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
