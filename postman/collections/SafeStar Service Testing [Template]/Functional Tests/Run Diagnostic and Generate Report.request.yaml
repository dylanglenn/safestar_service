$kind: http-request
url: "{{baseUrl}}/diagnostics/generate/:vehicleId"
method: POST
headers:
  Accept: application/json
pathVariables:
  vehicleId: "1002"
scripts:
  - type: afterResponse
    code: |-
      // ─────────────────────────────────────────────────────────────────────────────
      // FUNCTIONAL TEST: Run Diagnostic and Generate Report
      //
      // This endpoint starts an async diagnostic report generation job. The response
      // tells us the job was accepted and queued. We verify the initial state and
      // save the report ID for the Retrieve Diagnostic Report request.
      // ─────────────────────────────────────────────────────────────────────────────

      // TEST 1: Status code should be 201 Created
      // WHY: This POST creates a new diagnostic report job resource. 201 is the
      // correct status for resource creation. If this returns 200, the API is not
      // following REST conventions for async job creation.
      pm.test("Status code is 201 Created", function () {
          pm.response.to.have.status(201);
      });

      // TEST 2: Response body must be valid, parseable JSON
      // WHY: We need to parse the body to extract the report ID. If the body is
      // not valid JSON, we can't get the ID and the retrieve step will fail.
      pm.test("Response body is valid JSON", function () {
          pm.response.json();
      });

      const responseBody = pm.response.json();

      // TEST 3: status must be "queued"
      // WHY: Diagnostic report generation is an async job. When first submitted,
      // it should always be in "queued" state — the job hasn't started yet.
      // If the status is already "success" or "complete", the job ran synchronously,
      // which is unexpected for a potentially long-running operation. Note that
      // this API uses lowercase "queued" (unlike the run status which uses "QUEUED").
      pm.test("status is 'queued' for a newly submitted diagnostic job", function () {
          pm.expect(responseBody).to.have.property("status");
          pm.expect(responseBody.status).to.equal("queued");
      });

      // TEST 4: id must exist and be a string
      // WHY: The report ID is what we use to retrieve the completed report once
      // the async job finishes. Without it, we have no way to fetch the results.
      // It must be a string to match the API contract.
      pm.test("id exists and is a string", function () {
          pm.expect(responseBody).to.have.property("id");
          pm.expect(responseBody.id).to.be.a("string");
      });

      // CHAIN: Save report ID to a collection variable for use in Retrieve Diagnostic Report
      // WHY: The Retrieve Diagnostic Report and Send Diagnostic Report requests both
      // need this ID. Saving it here makes the test suite self-contained.
      const reportId = responseBody.id;
      pm.collectionVariables.set("reportId", reportId);
      console.log("Saved reportId to collection variables:", reportId);
    language: text/javascript
order: 12000
