openapi: 3.0.0
info:
  title: SafeStar Service API
  version: 1.0.0
  description: >-
    This collection contains the SafeStar Service API requests used to manage
    safety profiles, run safety scans, and generate diagnostics reports.


    ## Base URL

    All requests use `https://api.getpostman.com` as the API host (set this in your active
    environment, e.g., Dev/Stage/Prod).


    ## Folders / workflows

    - **Driver Safety**: Create / retrieve / update / delete a driver safety
    profile.

    - **Vehicle Safety**: Create / retrieve / update / delete a vehicle safety
    profile.

    - **Safety Scan**: Start a scan run, check run status, or cancel a run.

    - **Display**: Retrieve the completion message shown after safety checks
    finish.

    - **Reporting**: Generate diagnostics for a vehicle, retrieve a diagnostic
    report, and send the report.


servers:
  - url: 'https://api.getpostman.com'
paths:
  /driver/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathIdInteger'
        example: '1001'
    post:
      summary: Create Driver Safety Profile
      tags:
        - Driver Safety
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyObject'
            example: {}
      responses:
        '201':
          description: 201 Created - Profile Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverSafetyProfile'
              example:
                profileId: '1'
                driver:
                  firstName: Alex
                  lastName: Johnson
                  license:
                    issueDate: '2022-05-14'
                    expiry: '2026-05-14'
                    issuingState: CA
                    restrictions:
                      - B
                  email: alex.johnson@example.com
                safetyScore: 100
                hardStops: 0
                speeding: 0
                nightDrives: 0
                weather: 0
                ignoredWarnings: 0
        '409':
          description: 409 Conflict - Profile Already Exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileAlreadyExistsErrorResponse'
              example:
                error:
                  code: PROFILE_ALREADY_EXISTS
                  message: A safety profile already exists for this driver.
                  details:
                    driverId: 1002
                    existingProfileId: '2'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    get:
      summary: Retrieve Driver Safety Profile
      tags:
        - Driver Safety
      responses:
        '200':
          description: 200 OK - Profile Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverSafetyProfile'
              example:
                profileId: '1'
                driver:
                  firstName: Alex
                  lastName: Johnson
                  license:
                    issueDate: '2022-05-14'
                    expiry: '2026-05-14'
                    issuingState: CA
                    restrictions:
                      - B
                  email: alex.johnson@example.com
                safetyScore: 100
                hardStops: 0
                speeding: 0
                nightDrives: 0
                weather: 0
                ignoredWarnings: 0
        '404':
          description: 404 Not Found - Profile Missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundErrorResponse'
              example:
                error:
                  code: PROFILE_NOT_FOUND
                  message: No safety profile found for the specified driver.
                  details:
                    driverId: '{DRIVER_ID}'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    put:
      summary: Update Driver Safety Profile
      tags:
        - Driver Safety
      responses:
        '200':
          description: 200 OK - Profile Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverSafetyProfile'
              example:
                profileId: '1'
                driver:
                  firstName: Alex
                  lastName: Johnson
                  license:
                    issueDate: '2022-05-14'
                    expiry: '2026-05-14'
                    issuingState: CA
                    restrictions:
                      - B
                  email: alex.johnson@example.com
                safetyScore: 95
                hardStops: 0
                speeding: 1
                nightDrives: 0
                weather: 0
                ignoredWarnings: 0
        '400':
          description: 400 Bad Request - Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: Request body failed validation.
                  details:
                    fields:
                      - field: safetyScore
                        issue: must be an integer between 0 and 100
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    delete:
      summary: Delete Driver Safety Profile
      tags:
        - Driver Safety
      responses:
        '204':
          description: 204 No Content - Profile Deleted
        '404':
          description: 404 Not Found - Profile Missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundErrorResponse'
              example:
                error:
                  code: PROFILE_NOT_FOUND
                  message: No safety profile found for the specified driver.
                  details:
                    driverId: '1001'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /run:
    post:
      summary: Run
      tags:
        - Vehicle Safety
        - Safety Scan
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRequest'
            example:
              vehicle: '1002'
              driver: '1001'
      responses:
        '201':
          description: 201 - Run started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
              example:
                run: '1'
                status: QUEUED
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /run/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathIdInteger'
        example: '1'
    get:
      summary: Run Status
      tags:
        - Vehicle Safety
        - Safety Scan
      responses:
        '200':
          description: 200 - Completed run retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
              example:
                run: '1'
                status: COMPLETE
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    delete:
      summary: Cancel Run
      tags:
        - Vehicle Safety
        - Safety Scan
      responses:
        '200':
          description: 204 - Run cancelled successfully
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /vehicle/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathIdInteger'
        example: '1002'
    post:
      summary: Create Vehicle Safety Profile
      tags:
        - Vehicle Safety
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleSafetyProfileCreateRequest'
            example:
              vin: 1HGCM82633A004352
              tpms: OK
              tailLights: OK
              oilPressure: OK
              sensors: OK
              defrost: OK
              airbags: OK
              battery: OK
              newCode: true
              activeCodes:
                - P0300
                - P0420
                - P0455
                - P0171
                - P0128
      responses:
        '201':
          description: 201 Created - Vehicle Profile Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleSafetyProfileCreatedResponse'
              example:
                vehicleId: 2a8d3c55-0f3a-4c31-8a2a-3f2fd3a33d2d
                profileId: aa7f3f4a-6d6d-4b39-a11a-3cf8c9fe0a5b
                createdAt: '2026-03-12T10:25:01.000Z'
                updatedAt: '2026-03-12T10:25:01.000Z'
                status: ACTIVE
                riskScore: 12
                vin: 1HGCM82633A004352
                make: Toyota
                model: Camry
                year: 2021
                metrics:
                  hardCorneringEvents: 0
                  hardBrakingEvents: 0
                  speedingEvents: 0
        '400':
          description: 400 Bad Request - Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: Request body failed validation.
                  details:
                    fields:
                      - field: vin
                        issue: must be 17 characters
        '409':
          description: 409 Conflict - Profile Already Exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleProfileAlreadyExistsErrorResponse'
              example:
                error:
                  code: PROFILE_ALREADY_EXISTS
                  message: A safety profile already exists for this vehicle.
                  details:
                    vehicleId: 1002
                    existingProfileId: '2'
                    vin: 1HGCM82633A004352
        '500':
          description: 500 - Unexpected Error
      
    get:
      summary: Retrieve Vehicle Safety Profile
      tags:
        - Vehicle Safety
      responses:
        '200':
          description: 200 OK - Vehicle Profile Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleSafetyProfile'
              example:
                vehicle:
                  id: 123
                  vin: 1HGCM82633A004352
                  make: Honda
                  model: Accord
                  year: 2020
                  mileage: 45000
                tpms: OK
                tailLights: OK
                oilPressure: OK
                sensors: OK
                defrost: OK
                airbags: OK
                battery: OK
                newCode: true
                activeCodes:
                  - P0300
                  - P0420
                  - P0455
                  - P0171
                  - P0128
        '404':
          description: 404 Not Found - Vehicle Profile Missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleProfileNotFoundErrorResponse'
              example:
                error:
                  code: VEHICLE_PROFILE_NOT_FOUND
                  message: No safety profile found for the specified vehicle.
                  details:
                    vehicleId: '1002'
        '500':
          description: Retrieve Vehicle Safety Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    patch:
      summary: Update Vehicle Safety Profile
      tags:
        - Vehicle Safety
      responses:
        '200':
          description: 200 OK - Vehicle Profile Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleSafetyProfileUpdateResponse'
              example:
                vin: 1HGCM82633A004352
                tpms: OK
                tailLights: OK
                oilPressure: OK
                sensors: OK
                defrost: OK
                airbags: OK
                battery: OK
                newCode: false
                activeCodes:
                  - P0300
                  - P0420
                  - P0455
                  - P0171
                  - P0128
        '400':
          description: 400 Bad Request - Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: Request body failed validation.
                  details:
                    fields:
                      - field: battery
                        issue: 'value must be an enum: [OK, LOW, ERR]'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}
    delete:
      summary: Delete Vehicle Safety Profile
      tags:
        - Vehicle Safety
      responses:
        '204':
          description: 204 No Content - Vehicle Profile Deleted
        '404':
          description: 404 Not Found - Vehicle Profile Missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleProfileNotFoundErrorResponse'
              example:
                error:
                  code: VEHICLE_PROFILE_NOT_FOUND
                  message: No safety profile found for the specified vehicle.
                  details:
                    vehicleId: '1002'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /display:
    get:
      summary: Get message display upon completed safety checks
      tags:
        - Display
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayRequest'
            example:
              driver: '1001'
              vehicle: '1002'
      responses:
        '200':
          description: 200 - Display custom message after successful run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyObject'
              example: |-
                {
                    "message": "🚗✅ Hey \"\"! Safety score: 100—perfect drive vibes 😄 Keep it up: smooth accel/brake + stay alert. New codes: P0300 (misfire), P0420 (catalyst), P0455 (EVAP leak—check gas cap), P0171 (lean), P0128 (coolant/thermostat). 📅 Book service soon to protect mpg & performance! 🔧",
                    "html": "<div>🚗✅ Hey \"\"! Safety score: <b>100</b>—perfect drive vibes 😄 Keep it up: smooth accel/brake + stay alert. New codes found: <b>P0300</b>(misfire), <b>P0420</b>(catalyst), <b>P0455</b>(EVAP leak—check gas cap), <b>P0171</b>(lean), <b>P0128</b>(coolant/thermostat). 📅 Book service soon to avoid mpg drop. 🔧</div>"
                }
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /diagnostics/generate/{vehicleId}:
    parameters:
      - name: vehicleId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathVehicleIdInteger'
        example: '1002'
    post:
      summary: Run diagnostic and generate report
      tags:
        - Reporting
      responses:
        '201':
          description: 201 - Diagnostic report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsGenerateResponse'
              example:
                status: queued
                id: '1'
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /diagnostics/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathIdInteger'
        example: '1'
    get:
      summary: Retrieve diagnostic report
      tags:
        - Reporting
      responses:
        '200':
          description: 200 - Report sucessfully retrieve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsReportResponse'
              example:
                id: '{{$pathSegments ''1''}}'
                status: success
                report:
                  timestamp: '2026-03-13T10:15:00Z'
                  status: FAILED
                  job:
                    jobId: JOB-784512
                    type: VehicleSafetyScan
                    completed: true
                    durationMs: 4823
                    apiVersion: v2.4.1
                  vehicle:
                    id: 1     
                    vin: 1HGCM82633A004352
                    make: Honda
                    model: Accord
                    year: 2020
                    mileage: 45000
                  checks:
                    tpms:
                      status: OK
                      severity: NONE
                    tailLights:
                      status: OK
                      severity: NONE
                    oilPressure:
                      status: OK
                      severity: NONE
                    sensors:
                      status: OK
                      severity: NONE
                    defrost:
                      status: OK
                      severity: NONE
                    airbags:
                      status: OK
                      severity: NONE
                    battery:
                      status: OK
                      voltage: 12.6
                      severity: NONE
                  diagnostics:
                    newCodeDetected: true
                    activeCodes:
                      - code: P0300
                        description: Random/Multiple Cylinder Misfire Detected
                        severity: CRITICAL
                        recommendedAction: >-
                          Inspect ignition system, spark plugs, and fuel
                          injectors immediately.
                      - code: P0420
                        description: Catalyst System Efficiency Below Threshold
                        severity: MAJOR
                        recommendedAction: Inspect catalytic converter and oxygen sensors.
                      - code: P0455
                        description: Evaporative Emission System Leak (Large Leak)
                        severity: MAJOR
                        recommendedAction: Check fuel cap, EVAP hoses, and purge valve.
                      - code: P0171
                        description: System Too Lean (Bank 1)
                        severity: MAJOR
                        recommendedAction: >-
                          Inspect for vacuum leaks and check fuel delivery
                          system.
                      - code: P0128
                        description: >-
                          Coolant Thermostat Temperature Below Regulating
                          Temperature
                        severity: MODERATE
                        recommendedAction: Inspect thermostat and coolant temperature sensor.
                    failureReason: >-
                      Active diagnostic trouble codes detected during safety
                      scan.
                  summary:
                    overallSafetyStatus: NOT SAFE TO RELEASE
                    criticalIssues: 1
                    majorIssues: 3
                    moderateIssues: 1
                    notes: >-
                      Vehicle passed physical safety component checks but failed
                      due to active engine diagnostic trouble codes.
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

  /diagnostics/send/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PathIdInteger'
        example: '1'
    post:
      summary: Send diagnostic report
      tags:
        - Reporting
      responses:
        '204':
          description: 204 - Report sent successfully
        '500':
          description: 500 - Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnexpectedErrorResponse'
              example:
                error:
                  code: UNEXPECTED_ERROR
                  message: An unexpected error occurred.
                  details: {}

components:
  schemas:
    PathIdInteger:
      type: integer
      description: Reusable integer schema for {id} path parameters.

    PathVehicleIdInteger:
      type: integer
      description: Reusable integer schema for {vehicleId} path parameters.

    EmptyObject:
      type: object
      description: Empty object schema used where response shape is unspecified.
      additionalProperties: true

    EmptyDetails:
      type: object
      description: Generic empty details object.
      additionalProperties: true

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          $ref: '#/components/schemas/EmptyDetails'

    UnexpectedErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'

    ProfileAlreadyExistsErrorDetails:
      type: object
      properties:
        driverId:
          type: integer
        existingProfileId:
          type: string

    ProfileAlreadyExistsErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              $ref: '#/components/schemas/ProfileAlreadyExistsErrorDetails'

    ProfileNotFoundErrorDetails:
      type: object
      properties:
        driverId:
          type: string

    ProfileNotFoundErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              $ref: '#/components/schemas/ProfileNotFoundErrorDetails'

    ValidationFieldError:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string

    ValidationErrorDetails:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFieldError'

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              $ref: '#/components/schemas/ValidationErrorDetails'

    DriverLicense:
      type: object
      properties:
        issueDate:
          type: string
          format: date
        expiry:
          type: string
          format: date
        issuingState:
          type: string
        restrictions:
          type: array
          items:
            type: string

    Driver:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        license:
          $ref: '#/components/schemas/DriverLicense'
        email:
          type: string
          format: email

    DriverSafetyProfile:
      type: object
      properties:
        profileId:
          type: string
        driver:
          $ref: '#/components/schemas/Driver'
        safetyScore:
          type: integer
        hardStops:
          type: integer
        speeding:
          type: integer
        nightDrives:
          type: integer
        weather:
          type: integer
        ignoredWarnings:
          type: integer

    RunRequest:
      type: object
      properties:
        vehicle:
          type: string
        driver:
          type: string

    RunResponse:
      type: object
      properties:
        run:
          type: string
        status:
          type: string

    VehicleMetrics:
      type: object
      properties:
        hardCorneringEvents:
          type: integer
        hardBrakingEvents:
          type: integer
        speedingEvents:
          type: integer

    VehicleSafetyProfileCreatedResponse:
      type: object
      properties:
        vehicleId:
          type: string
        profileId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        status:
          type: string
        riskScore:
          type: integer
        vin:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        metrics:
          $ref: '#/components/schemas/VehicleMetrics'

    VehicleSafetyProfileCreateRequest:
      type: object
      properties:
        vin:
          type: string
        tpms:
          type: string
        tailLights:
          type: string
        oilPressure:
          type: string
        sensors:
          type: string
        defrost:
          type: string
        airbags:
          type: string
        battery:
          type: string
        newCode:
          type: boolean
        activeCodes:
          type: array
          items:
            type: string

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        vin:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        mileage:
          type: integer

    VehicleSafetyProfile:
      type: object
      properties:
        vehicle:
          $ref: '#/components/schemas/Vehicle'
        tpms:
          type: string
        tailLights:
          type: string
        oilPressure:
          type: string
        sensors:
          type: string
        defrost:
          type: string
        airbags:
          type: string
        battery:
          type: string
        newCode:
          type: boolean
        activeCodes:
          type: array
          items:
            type: string

    VehicleSafetyProfileUpdateResponse:
      type: object
      properties:
        vin:
          type: string
        tpms:
          type: string
        tailLights:
          type: string
        oilPressure:
          type: string
        sensors:
          type: string
        defrost:
          type: string
        airbags:
          type: string
        battery:
          type: string
        newCode:
          type: boolean
        activeCodes:
          type: array
          items:
            type: string

    VehicleProfileAlreadyExistsErrorDetails:
      type: object
      properties:
        vehicleId:
          type: integer
        existingProfileId:
          type: string
        vin:
          type: string

    VehicleProfileAlreadyExistsErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
